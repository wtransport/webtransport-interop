# WebTransport Interop Bug Report GitHub Issue Form

name: "Bug Report"
description: "File a technical defect report."
labels: ["bug", "triage"]
body:
  - type: "markdown"
    attributes:
      value: |
        Required details for defect diagnosis.

  - type: "input"
    id: "version"
    attributes:
      label: "Version"
      description: "Specific version identifier."
      placeholder: "e.g., 0.2.1"
    validations:
      required: true

  - type: "input"
    id: "python-version"
    attributes:
      label: "Python Runtime"
      description: "Interpreter version."
      placeholder: "e.g., 3.14.5"
    validations:
      required: true

  - type: "dropdown"
    id: "os"
    attributes:
      label: "Operating System"
      description: "Host platform environment."
      options:
        - "Linux"
        - "macOS"
        - "Windows"
      multiple: true
    validations:
      required: true

  - type: "dropdown"
    id: "network"
    attributes:
      label: "Network Topology"
      description: "Execution environment connectivity."
      options:
        - "Loopback"
        - "LAN"
        - "WAN"
        - "Container"
        - "CI"
      multiple: true
    validations:
      required: true

  - type: "textarea"
    id: "description"
    attributes:
      label: "Defect Summary"
      description: "Technical description of the anomaly."
    validations:
      required: true

  - type: "textarea"
    id: "reproduction"
    attributes:
      label: "Reproduction"
      description: "Minimal executable code snippet demonstrating the failure."
    validations:
      required: true

  - type: "textarea"
    id: "comparison"
    attributes:
      label: "Expected vs Actual"
      description: "Contrast expected protocol behavior with observed results."
    validations:
      required: true

  - type: "textarea"
    id: "logs"
    attributes:
      label: "Diagnostics"
      description: "Tracebacks or debug logs."
      render: "shell"

  - type: "checkboxes"
    id: "checklist"
    attributes:
      label: "Checklist"
      options:
        - label: "Checked existing issues for duplicates."
          required: true
        - label: "Willing to submit a Pull Request."
          required: false
