# WebTransport Interop GitHub CI

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    types: [ opened, synchronize, reopened ]
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_COLOR: "1"
  PIP_ROOT_USER_ACTION: "ignore"

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dev-requirements.txt
          pip install -e .

      - name: Code quality checks
        run: |
          isort --check-only src scripts
          black --check src scripts
          flake8 src scripts
          mypy src scripts

  interop-execution:
    needs: lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Provision system dependencies
        run: |
          python scripts/provision.py

      - name: Execute interop matrix
        run: |
          python -m webtransport_interop.main --output matrix_result.json

      - name: Upload interop report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: interop-report
          path: matrix_result.json

  deploy:
    needs: interop-execution
    if: (github.event_name == 'push' || github.event_name == 'schedule') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download interop report
        uses: actions/download-artifact@v8
        with:
          name: interop-report
          path: site/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
